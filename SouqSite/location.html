      <a href="index.html"    class="nav-link" data-t="nav.home">Home</a>

      </div>
    </nav>
  </header>

  <!-- ── PAGE HERO ── -->
  <div class="page-hero">
    <div class="container">
      <p class="label" data-t="location.label">Where to Find Us</p>
      <h1 data-t="location.title">Our Location</h1>
    </div>
  </div>

  <!-- ── MAP + DETAILS ── -->
  <section class="section">
    <div class="container">

      <div class="map-frame-wrap reveal">
        <iframe
          id="map-frame"
          src=""
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Shop location map"
        ></iframe>
      </div>

      <div class="location-details reveal">
        <div class="location-rows">

          <div class="location-row">
            <div class="loc-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div class="loc-info">
              <h4 data-t="location.addressLbl">Address</h4>
              <p id="loc-address">—</p>
            </div>
          </div>

          <div class="location-row">
            <div class="loc-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="loc-info">
              <h4 data-t="location.weekdaysLbl">Weekdays</h4>
              <p id="loc-weekdays">—</p>
            </div>
          </div>

          <div class="location-row">
            <div class="loc-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div class="loc-info">
              <h4 data-t="location.weekendsLbl">Weekends</h4>
              <p id="loc-weekends">—</p>
            </div>
          </div>

        </div>

        <div>
          <a href="#" class="btn btn-gold" id="directions-btn" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polygon points="3 11 22 2 13 21 11 13 3 11"/>
            </svg>
            <span data-t="location.directions">Get Directions</span>
          </a>
        </div>
      </div>

    </div>
  </section>

      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="index.html"    data-t="nav.home">Home</a>
        <a href="products.html" data-t="nav.products">Products</a>
